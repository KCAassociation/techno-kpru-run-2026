  <script>
    $.Thailand({
        $district: $('#address3'), $amphoe: $('#address4'), $province: $('#address5'), $zipcode: $('#address6'),
        onDataFill: function(data){ console.log('Auto Address Completed'); }
    });

    function SizeDropdown() { google.script.run.withSuccessHandler(d1DropDown).getDropdownSize(); }
    function d1DropDown(values) {
      var list = document.getElementById('size');
      if(!list) return;
      list.innerHTML = '<option selected disabled value="">เลือกขนาดเสื้อ</option>';
      for (var i = 0; i < values.length; i++) {
        if(values[i][0] === "") continue;
        var option = document.createElement("option"); option.value = values[i][0]; option.text = values[i][0]; list.appendChild(option);
      }
    }

    /** [ฟังก์ชันคำนวณและคัดกรองรุ่นการแข่งขันอัจฉริยะ - ปรับปรุงตัดรุ่น Open ออกตามสั่ง] */
    function filterRunningModels() {
      var gender = document.getElementById('gender').value;
      var yBirthStr = document.getElementById('y_birth').value.trim();
      var distance = document.getElementById('distance_filter').value;
      var typeRunSelect = document.getElementById('type_run');
      
      if (!typeRunSelect) return;
      
      if (!gender || !yBirthStr || yBirthStr.length !== 4 || !distance) {
        typeRunSelect.innerHTML = '<option selected disabled value="">กรุณากรอก เพศ, พ.ศ.เกิด และระยะวิ่งให้ครบก่อน</option>';
        return;
      }
      
      var yBirth = parseInt(yBirthStr);
      if (isNaN(yBirth)) return;
      
      var currentYear = 2569;
      var age = currentYear - yBirth;
      
      var ageGroupText = "";
      
      if (age <= 19) {
        ageGroupText = "รุ่นอายุไม่เกิน 19 ปี";
      } else if (age >= 20 && age <= 29) {
        ageGroupText = "รุ่นอายุ 20-29 ปี";
      } else if (age >= 30 && age <= 39) {
        ageGroupText = "รุ่นอายุ 30-39 ปี";
      } else if (age >= 40 && age <= 49) {
        ageGroupText = "รุ่นอายุ 40-49 ปี";
      } else if (age >= 50 && age <= 59) {
        ageGroupText = "รุ่นอายุ 50-59 ปี";
      } else if (age >= 60) {
        ageGroupText = "รุ่นอายุ 60 ปีขึ้นไป";
      }
      
      var specificModel = distance + " กม. - " + ageGroupText + " " + gender;
      
      typeRunSelect.innerHTML = '';
      
      var opt1 = document.createElement("option");
      opt1.value = specificModel;
      opt1.text = specificModel;
      typeRunSelect.appendChild(opt1);
    }
  </script>
